name: ledger-check

on:
  push:
  pull_request:

jobs:
  ledger-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run proof ledger gate
        run: python skill/Skill_WinCreator/scripts/ledger_check.py PROOF_LEDGER.md
